<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>金银 Planet - 聚光灯方案</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        
        .slide {
            width: 1920px;
            height: 1080px;
            position: relative;
            /* 深邃黑色背景 */
            background: #050505;
            overflow: hidden;
        }
        
        /* 顶部聚光灯效果 */
        .spotlight {
            position: absolute;
            top: -400px;
            left: 50%;
            transform: translateX(-50%);
            width: 1400px;
            height: 1000px;
            background: radial-gradient(
                ellipse at top,
                rgba(255, 215, 0, 0.25) 0%,
                rgba(255, 165, 0, 0.12) 30%,
                rgba(184, 134, 11, 0.06) 60%,
                transparent 70%
            );
            filter: blur(30px);
        }
        
        /* 光束效果 */
        .light-beam {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 800px;
            background: linear-gradient(
                to bottom,
                rgba(255, 215, 0, 0.15) 0%,
                rgba(255, 215, 0, 0.05) 50%,
                transparent 100%
            );
            filter: blur(20px);
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
        }
        
        /* 底部金色光带 */
        .bottom-glow {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 200px;
            background: linear-gradient(
                to top,
                rgba(255, 215, 0, 0.2) 0%,
                rgba(255, 215, 0, 0.08) 50%,
                transparent 100%
            );
        }
        
        /* 粒子光点 */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(3px 3px at 15% 20%, rgba(255, 215, 0, 0.8), transparent),
                radial-gradient(2px 2px at 25% 35%, rgba(255, 255, 255, 0.6), transparent),
                radial-gradient(3px 3px at 35% 25%, rgba(255, 215, 0, 0.7), transparent),
                radial-gradient(2px 2px at 45% 40%, rgba(255, 255, 255, 0.5), transparent),
                radial-gradient(3px 3px at 55% 30%, rgba(255, 215, 0, 0.9), transparent),
                radial-gradient(2px 2px at 65% 45%, rgba(255, 255, 255, 0.7), transparent);
            background-size: 800px 600px;
            animation: float 8s ease-in-out infinite;
            opacity: 0.7;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        /* 标题区域 - 中上 */
        .title-area {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
            width: 1000px;
        }
        
        .title {
            font-size: 120px;
            font-weight: 900;
            /* 发光金字效果 */
            background: linear-gradient(
                180deg,
                #FFF8DC 0%,
                #FFD700 30%,
                #FFA500 70%,
                #B8860B 100%
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            /* 强烈发光效果 */
            filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.8))
                    drop-shadow(0 0 60px rgba(255, 215, 0, 0.5))
                    drop-shadow(0 4px 12px rgba(0, 0, 0, 0.8));
            letter-spacing: 16px;
            margin-bottom: 20px;
        }
        
        .subtitle {
            font-size: 36px;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 8px;
            font-weight: 300;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }
        
        /* 人物形象 - 居中，底部 */
        .character-container {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            height: 850px;
            z-index: 5;
            /* 底部渐变融入 */
            -webkit-mask-image: linear-gradient(
                to top,
                black 60%,
                transparent 95%
            );
            mask-image: linear-gradient(
                to top,
                black 60%,
                transparent 95%
            );
        }
        
        .character {
            height: 100%;
            /* 增强对比融入聚光灯 */
            filter: 
                brightness(1.12)
                contrast(1.2)
                saturate(1.1)
                drop-shadow(0 40px 80px rgba(0, 0, 0, 0.7))
                drop-shadow(0 0 50px rgba(255, 215, 0, 0.3));
        }
        
        /* 装饰圆环 */
        .decorative-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 900px;
            height: 900px;
            border: 1px solid rgba(255, 215, 0, 0.15);
            border-radius: 50%;
            z-index: 1;
        }
        
        .decorative-ring::before {
            content: '';
            position: absolute;
            top: 50px;
            left: 50px;
            right: 50px;
            bottom: 50px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 50%;
        }
        
        /* 底部装饰线 */
        .bottom-line {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 2px;
            background: linear-gradient(
                to right,
                transparent,
                rgba(255, 215, 0, 0.6),
                transparent
            );
        }
    </style>
</head>
<body>
    <div class="slide">
        <!-- 背景元素 -->
        <div class="spotlight"></div>
        <div class="light-beam"></div>
        <div class="bottom-glow"></div>
        <div class="particles"></div>
        <div class="decorative-ring"></div>
        
        <!-- 人物形象 -->
        <div class="character-container">
            <img src="/home/admin/.openclaw/workspace/images/jinyin-character/04-cover-final.png" alt="金银" class="character">
        </div>
        
        <!-- 标题 -->
        <div class="title-area">
            <div class="title">金银 Planet</div>
            <div class="subtitle">让财富与智慧同行</div>
        </div>
        
        <!-- 装饰 -->
        <div class="bottom-line"></div>
    </div>
</body>
</html>
