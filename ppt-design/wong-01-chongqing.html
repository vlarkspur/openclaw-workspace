<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>金银 Planet - 王家卫风格：重庆森林</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            font-family: 'Noto Serif SC', serif;
        }
        
        .slide {
            width: 1920px;
            height: 1080px;
            position: relative;
            /* 王家卫经典蓝绿色调 */
            background: linear-gradient(
                135deg,
                #0a1a1a 0%,
                #1a3a3a 30%,
                #2a5a5a 50%,
                #1a4a4a 70%,
                #0d2a2a 100%
            );
            overflow: hidden;
        }
        
        /* 模糊霓虹光斑 - 背景 */
        .neon-bokeh {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(150px 150px at 20% 30%, rgba(255, 100, 150, 0.4) 0%, transparent 70%),
                radial-gradient(200px 200px at 80% 20%, rgba(255, 200, 100, 0.3) 0%, transparent 70%),
                radial-gradient(100px 100px at 60% 60%, rgba(100, 200, 255, 0.35) 0%, transparent 70%),
                radial-gradient(180px 180px at 40% 80%, rgba(255, 150, 150, 0.3) 0%, transparent 70%);
            filter: blur(60px);
            opacity: 0.7;
        }
        
        /* 散景光斑层 */
        .bokeh-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(8px 8px at 15% 25%, rgba(255, 255, 255, 0.8) 0%, transparent 50%),
                radial-gradient(6px 6px at 25% 35%, rgba(255, 200, 150, 0.6) 0%, transparent 50%),
                radial-gradient(10px 10px at 35% 15%, rgba(200, 255, 255, 0.7) 0%, transparent 50%),
                radial-gradient(7px 7px at 45% 45%, rgba(255, 255, 255, 0.5) 0%, transparent 50%),
                radial-gradient(9px 9px at 55% 25%, rgba(255, 150, 200, 0.6) 0%, transparent 50%),
                radial-gradient(6px 6px at 65% 55%, rgba(255, 255, 255, 0.7) 0%, transparent 50%),
                radial-gradient(8px 8px at 75% 35%, rgba(200, 200, 255, 0.6) 0%, transparent 50%),
                radial-gradient(7px 7px at 85% 65%, rgba(255, 255, 255, 0.8) 0%, transparent 50%);
            filter: blur(3px);
            animation: bokeh-float 15s ease-in-out infinite;
        }
        
        @keyframes bokeh-float {
            0%, 100% { opacity: 0.6; transform: translateY(0); }
            50% { opacity: 0.8; transform: translateY(-10px); }
        }
        
        /* 雨景效果 */
        .rain {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(180deg, transparent 0%, rgba(255, 255, 255, 0.1) 50%, transparent 100%);
            background-size: 2px 100px;
            animation: rain-fall 2s linear infinite;
            opacity: 0.3;
        }
        
        @keyframes rain-fall {
            0% { background-position: 0 0; }
            100% { background-position: 0 200px; }
        }
        
        /* 玻璃反光效果 */
        .glass-reflection {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                135deg,
                rgba(255, 255, 255, 0.05) 0%,
                transparent 40%,
                rgba(255, 255, 255, 0.03) 60%,
                transparent 100%
            );
            pointer-events: none;
        }
        
        /* 暗角效果 */
        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(
                ellipse at center,
                transparent 30%,
                rgba(0, 0, 0, 0.7) 100%
            );
            pointer-events: none;
        }
        
        /* 人物形象 - 半剪影效果 */
        .character-container {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            height: 850px;
            z-index: 5;
            opacity: 0.85;
        }
        
        .character {
            height: 100%;
            /* 王家卫风格调色 */
            filter: 
                contrast(1.3)
                saturate(0.7)
                hue-rotate(-10deg)
                brightness(0.9)
                drop-shadow(0 0 60px rgba(255, 200, 150, 0.4));
        }
        
        /* 暖色轮廓光 */
        .rim-light {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 900px;
            background: radial-gradient(
                ellipse at bottom,
                rgba(255, 200, 150, 0.3) 0%,
                rgba(255, 150, 100, 0.15) 40%,
                transparent 70%
            );
            filter: blur(40px);
            z-index: 4;
        }
        
        /* 标题区域 - 竖排文字 */
        .title-area {
            position: absolute;
            top: 120px;
            right: 180px;
            z-index: 10;
            writing-mode: vertical-rl;
            text-orientation: mixed;
        }
        
        .title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 96px;
            color: rgba(255, 255, 255, 0.95);
            letter-spacing: 24px;
            /* 轻微发光 */
            text-shadow: 
                0 0 20px rgba(255, 255, 255, 0.5),
                0 0 40px rgba(255, 200, 150, 0.3);
            margin-bottom: 40px;
        }
        
        /* 时间戳文字 */
        .timestamp {
            position: absolute;
            bottom: 80px;
            right: 180px;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 300;
            letter-spacing: 3px;
            z-index: 10;
        }
        
        /* 诗意文字 */
        .poetic-text {
            position: absolute;
            bottom: 50px;
            left: 180px;
            font-size: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 300;
            letter-spacing: 4px;
            z-index: 10;
            max-width: 500px;
            line-height: 1.8;
        }
        
        /* 装饰线条 */
        .decorative-line {
            position: absolute;
            bottom: 120px;
            right: 180px;
            width: 150px;
            height: 1px;
            background: linear-gradient(
                to right,
                transparent,
                rgba(255, 255, 255, 0.4),
                transparent
            );
        }
        
        /* 胶片颗粒感 */
        .film-grain {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.08;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="slide">
        <!-- 背景效果 -->
        <div class="neon-bokeh"></div>
        <div class="bokeh-layer"></div>
        <div class="rain"></div>
        <div class="glass-reflection"></div>
        <div class="vignette"></div>
        <div class="film-grain"></div>
        
        <!-- 轮廓光 -->
        <div class="rim-light"></div>
        
        <!-- 人物形象 -->
        <div class="character-container">
            <img src="/home/admin/.openclaw/workspace/images/jinyin-character/04-cover-final.png" alt="金银" class="character">
        </div>
        
        <!-- 标题 -->
        <div class="title-area">
            <div class="title">金银 Planet</div>
        </div>
        
        <!-- 时间戳 -->
        <div class="timestamp">2026 年 3 月 16 日，下午 3 点之前的一分钟</div>
        
        <!-- 诗意文字 -->
        <div class="poetic-text">
            一个人，22 个 AI，一个星球。<br>
            在重庆的夜里，我们都是孤独的行星。
        </div>
        
        <!-- 装饰线 -->
        <div class="decorative-line"></div>
    </div>
</body>
</html>
