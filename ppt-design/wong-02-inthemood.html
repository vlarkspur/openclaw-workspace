<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>金银 Planet - 王家卫风格：花样年华</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            font-family: 'Noto Serif SC', serif;
        }
        
        .slide {
            width: 1920px;
            height: 1080px;
            position: relative;
            /* 花样年华暖黄色调 */
            background: linear-gradient(
                135deg,
                #1a1510 0%,
                #2a2015 30%,
                #3a2a18 50%,
                #2a2015 70%,
                #1a1208 100%
            );
            overflow: hidden;
        }
        
        /* 复古霓虹灯 - 暖色调 */
        .neon-sign {
            position: absolute;
            top: 100px;
            left: 150px;
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 180px;
            color: rgba(255, 180, 100, 0.15);
            text-shadow: 
                0 0 30px rgba(255, 180, 100, 0.5),
                0 0 60px rgba(255, 150, 80, 0.3),
                0 0 90px rgba(255, 120, 60, 0.2);
            opacity: 0.6;
            z-index: 1;
            letter-spacing: 20px;
        }
        
        /* 暖色光斑 */
        .warm-bokeh {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(200px 200px at 70% 30%, rgba(255, 200, 150, 0.35) 0%, transparent 70%),
                radial-gradient(150px 150px at 80% 50%, rgba(255, 180, 120, 0.25) 0%, transparent 70%),
                radial-gradient(180px 180px at 60% 70%, rgba(255, 220, 180, 0.3) 0%, transparent 70%);
            filter: blur(50px);
            opacity: 0.8;
        }
        
        /* 烟雾/朦胧感 */
        .haze {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(
                ellipse at 50% 60%,
                rgba(255, 200, 150, 0.12) 0%,
                transparent 60%
            );
            filter: blur(80px);
        }
        
        /* 散景光斑 */
        .bokeh-dust {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(5px 5px at 20% 40%, rgba(255, 220, 180, 0.7) 0%, transparent 50%),
                radial-gradient(4px 4px at 30% 60%, rgba(255, 200, 150, 0.5) 0%, transparent 50%),
                radial-gradient(6px 6px at 40% 30%, rgba(255, 230, 190, 0.6) 0%, transparent 50%),
                radial-gradient(4px 4px at 50% 70%, rgba(255, 210, 160, 0.5) 0%, transparent 50%),
                radial-gradient(5px 5px at 60% 50%, rgba(255, 220, 170, 0.6) 0%, transparent 50%),
                radial-gradient(4px 4px at 70% 80%, rgba(255, 200, 140, 0.5) 0%, transparent 50%);
            filter: blur(2px);
            animation: dust-float 20s ease-in-out infinite;
        }
        
        @keyframes dust-float {
            0%, 100% { opacity: 0.5; transform: translateY(0) translateX(0); }
            33% { opacity: 0.7; transform: translateY(-15px) translateX(10px); }
            66% { opacity: 0.6; transform: translateY(10px) translateX(-10px); }
        }
        
        /* 时钟/时间元素装饰 */
        .clock-element {
            position: absolute;
            top: 150px;
            right: 200px;
            width: 120px;
            height: 120px;
            border: 2px solid rgba(255, 200, 150, 0.3);
            border-radius: 50%;
            z-index: 2;
        }
        
        .clock-element::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 2px;
            height: 40px;
            background: rgba(255, 200, 150, 0.4);
            transform-origin: bottom center;
            transform: translate(-50%, -100%) rotate(45deg);
        }
        
        .clock-element::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 2px;
            height: 30px;
            background: rgba(255, 200, 150, 0.3);
            transform-origin: bottom center;
            transform: translate(-50%, -100%) rotate(120deg);
        }
        
        /* 暗角 */
        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(
                ellipse at center,
                transparent 20%,
                rgba(0, 0, 0, 0.8) 100%
            );
            pointer-events: none;
        }
        
        /* 人物形象 */
        .character-container {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            height: 800px;
            z-index: 5;
            opacity: 0.8;
        }
        
        .character {
            height: 100%;
            /* 暖色调王家卫风格 */
            filter: 
                contrast(1.25)
                saturate(0.65)
                sepia(0.3)
                hue-rotate(-5deg)
                brightness(0.85)
                drop-shadow(0 0 80px rgba(255, 180, 100, 0.5));
        }
        
        /* 底部暖光 */
        .bottom-warm-light {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 500px;
            background: radial-gradient(
                ellipse at bottom,
                rgba(255, 180, 100, 0.4) 0%,
                rgba(255, 150, 80, 0.2) 50%,
                transparent 70%
            );
            filter: blur(60px);
            z-index: 4;
        }
        
        /* 标题 - 竖排 */
        .title-area {
            position: absolute;
            top: 100px;
            right: 150px;
            z-index: 10;
            writing-mode: vertical-rl;
            text-orientation: mixed;
        }
        
        .title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 108px;
            color: rgba(255, 240, 220, 0.95);
            letter-spacing: 28px;
            text-shadow: 
                0 0 25px rgba(255, 200, 150, 0.6),
                0 0 50px rgba(255, 180, 100, 0.4),
                0 0 75px rgba(255, 150, 80, 0.2);
        }
        
        /* 英文副标题 */
        .subtitle {
            position: absolute;
            top: 120px;
            right: 280px;
            font-size: 24px;
            color: rgba(255, 220, 180, 0.6);
            letter-spacing: 8px;
            font-weight: 300;
            z-index: 10;
            writing-mode: vertical-rl;
            text-orientation: mixed;
        }
        
        /* 诗意文字 */
        .poetic-text {
            position: absolute;
            bottom: 100px;
            left: 150px;
            font-size: 22px;
            color: rgba(255, 230, 200, 0.7);
            font-weight: 300;
            letter-spacing: 5px;
            z-index: 10;
            line-height: 2;
        }
        
        /* 时间戳 */
        .timestamp {
            position: absolute;
            bottom: 60px;
            right: 150px;
            font-size: 16px;
            color: rgba(255, 200, 150, 0.4);
            font-weight: 300;
            letter-spacing: 2px;
            z-index: 10;
        }
        
        /* 装饰框线 */
        .frame-line {
            position: absolute;
            top: 100px;
            left: 150px;
            width: 1px;
            height: 400px;
            background: linear-gradient(
                to bottom,
                transparent,
                rgba(255, 200, 150, 0.3),
                transparent
            );
        }
        
        /* 胶片颗粒 */
        .film-grain {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.1;
            pointer-events: none;
        }
        
        /* 镜子反射效果 - 装饰 */
        .mirror-reflection {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%) scaleY(-0.3);
            width: 400px;
            height: 400px;
            background: radial-gradient(
                ellipse at bottom,
                rgba(255, 200, 150, 0.15) 0%,
                transparent 70%
            );
            filter: blur(30px);
            z-index: 3;
        }
    </style>
</head>
<body>
    <div class="slide">
        <!-- 背景效果 -->
        <div class="neon-sign">金银</div>
        <div class="warm-bokeh"></div>
        <div class="haze"></div>
        <div class="bokeh-dust"></div>
        <div class="vignette"></div>
        <div class="film-grain"></div>
        
        <!-- 时钟元素 -->
        <div class="clock-element"></div>
        
        <!-- 底部暖光 -->
        <div class="bottom-warm-light"></div>
        
        <!-- 镜子反射 -->
        <div class="mirror-reflection"></div>
        
        <!-- 人物形象 -->
        <div class="character-container">
            <img src="/home/admin/.openclaw/workspace/images/jinyin-character/04-cover-final.png" alt="金银" class="character">
        </div>
        
        <!-- 标题 -->
        <div class="title-area">
            <div class="title">金银 Planet</div>
        </div>
        
        <!-- 副标题 -->
        <div class="subtitle">In the Mood for Wealth</div>
        
        <!-- 诗意文字 -->
        <div class="poetic-text">
            如果记忆是一个星球，<br>
            我希望它永远不要熄灭。
        </div>
        
        <!-- 时间戳 -->
        <div class="timestamp">二零二六年 · 春 · 重庆</div>
        
        <!-- 装饰线 -->
        <div class="frame-line"></div>
    </div>
</body>
</html>
