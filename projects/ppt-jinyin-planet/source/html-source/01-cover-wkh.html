<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>金银 Planet - 王家卫风格封面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            font-family: 'STHeiti', 'Microsoft YaHei', sans-serif;
            background: #000;
        }
        
        .container {
            width: 1920px;
            height: 1080px;
            position: relative;
            background: linear-gradient(135deg, #0a0e1a 0%, #1a1a2e 50%, #0f0f23 100%);
        }
        
        /* 背景光斑效果 */
        .bokeh {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.3;
            animation: float 20s infinite ease-in-out;
        }
        
        .bokeh-1 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #1a4a5a 0%, transparent 70%);
            top: 10%;
            left: 15%;
            animation-delay: 0s;
        }
        
        .bokeh-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #2a5a4a 0%, transparent 70%);
            top: 50%;
            right: 10%;
            animation-delay: -5s;
        }
        
        .bokeh-3 {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, #3a4a6a 0%, transparent 70%);
            bottom: 20%;
            left: 30%;
            animation-delay: -10s;
        }
        
        .bokeh-4 {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, #4a3a5a 0%, transparent 70%);
            top: 30%;
            left: 60%;
            animation-delay: -15s;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }
        
        /* 雨丝效果 */
        .rain {
            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                180deg,
                transparent 0%,
                rgba(255,255,255,0.03) 1%,
                transparent 2%
            );
            animation: rain 3s linear infinite;
            opacity: 0.4;
        }
        
        @keyframes rain {
            0% { background-position: 0 0; }
            100% { background-position: 0 100px; }
        }
        
        /* 霓虹灯效果 */
        .neon-glow {
            position: absolute;
            width: 600px;
            height: 200px;
            background: radial-gradient(ellipse, rgba(0,255,255,0.1) 0%, transparent 70%);
            top: 5%;
            right: 15%;
            filter: blur(30px);
        }
        
        /* 主标题 */
        .title {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 100;
        }
        
        .title-main {
            font-size: 96px;
            font-weight: bold;
            color: #fff;
            letter-spacing: 20px;
            text-shadow: 
                0 0 10px rgba(255,215,0,0.8),
                0 0 20px rgba(255,215,0,0.6),
                0 0 40px rgba(255,215,0,0.4),
                0 0 80px rgba(255,215,0,0.2);
            animation: titlePulse 4s infinite ease-in-out;
            background: linear-gradient(180deg, #FFD700 0%, #C0C0C0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        @keyframes titlePulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
        
        .title-sub {
            font-size: 28px;
            color: rgba(255,255,255,0.7);
            letter-spacing: 15px;
            margin-top: 30px;
            font-weight: 300;
        }
        
        /* 底部文字 - 王家卫风格时间戳 */
        .footer {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 100;
        }
        
        .footer-text {
            font-size: 18px;
            color: rgba(255,255,255,0.5);
            letter-spacing: 5px;
            font-weight: 300;
            line-height: 2;
        }
        
        .footer-highlight {
            color: rgba(255,215,0,0.7);
            font-style: italic;
        }
        
        /* 装饰线条 */
        .line {
            position: absolute;
            width: 1px;
            height: 150px;
            background: linear-gradient(180deg, transparent 0%, rgba(255,215,0,0.3) 50%, transparent 100%);
            left: 50%;
            transform: translateX(-50%);
        }
        
        .line-top {
            top: 30px;
        }
        
        .line-bottom {
            bottom: 30px;
        }
        
        /* 胶片颗粒效果 */
        .grain {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%' height='100%' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
            opacity: 0.15;
            pointer-events: none;
            z-index: 50;
        }
        
        /* 暗角效果 */
        .vignette {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 0%, transparent 50%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
            z-index: 51;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 背景效果 -->
        <div class="bokeh bokeh-1"></div>
        <div class="bokeh bokeh-2"></div>
        <div class="bokeh bokeh-3"></div>
        <div class="bokeh bokeh-4"></div>
        <div class="neon-glow"></div>
        <div class="rain"></div>
        
        <!-- 胶片颗粒 + 暗角 -->
        <div class="grain"></div>
        <div class="vignette"></div>
        
        <!-- 装饰线条 -->
        <div class="line line-top"></div>
        
        <!-- 主标题 -->
        <div class="title">
            <div class="title-main">金银 Planet</div>
            <div class="title-sub">一个人的集团 · 一支 AI 军队</div>
        </div>
        
        <!-- 装饰线条 -->
        <div class="line line-bottom"></div>
        
        <!-- 底部文字 -->
        <div class="footer">
            <div class="footer-text">
                <span class="footer-highlight">2026 年 3 月 16 日</span>，重庆<br>
                一个人，22 个 AI，一个星球
            </div>
        </div>
    </div>
</body>
</html>
